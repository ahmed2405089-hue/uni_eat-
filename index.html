<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIEats - University Food Ordering</title>
    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/app.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }
        .hero {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            animation: fadeInUp 1s ease-out;
        }
        .logo {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            animation: bounceIn 1.5s ease-out;
        }
        .tagline {
            font-size: 1.2em;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeIn 2s ease-out 0.5s forwards;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            opacity: 0;
            animation: fadeIn 2s ease-out 1s forwards;
        }
        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            color: #fff;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before {
            left: 100%;
        }
        .btn-primary {
            background: #34a853;
            box-shadow: 0 4px 15px rgba(52, 168, 83, 0.4);
        }
        .btn-primary:hover {
            background: #2e7d32;
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(52, 168, 83, 0.6);
        }
        .btn-secondary {
            background: #4285f4;
            box-shadow: 0 4px 15px rgba(66, 133, 244, 0.4);
        }
        .btn-secondary:hover {
            background: #3367d6;
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 6px 20px rgba(66, 133, 244, 0.6);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @media (max-width: 600px) {
            .hero {
                padding: 20px;
                animation: fadeInUp 1s ease-out;
            }
            .logo {
                font-size: 2.5em;
                animation: bounceIn 1.5s ease-out;
            }
            .buttons {
                flex-direction: column;
                align-items: center;
                animation: fadeIn 2s ease-out 1s forwards;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="logo">🍔 UNIEats</h1>
        <p class="tagline">Delicious food delivered right to your campus doorstep. Order from your favorite university restaurants with ease!</p>
        <div class="buttons">
            <a href="pages/register.html" class="btn btn-primary">Get Started - Register</a>
            <a href="pages/login.html" class="btn btn-secondary">Already Have an Account? Login</a>
        </div>
    </div>
</body>
</html>
