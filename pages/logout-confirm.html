<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIEats - Logout Confirmation</title>
    <link rel="stylesheet" href="../styles/app.css">
</head>
<body>

    <main class="page-shell split-layout">
        
        <div class="form-panel">
            <main class="container">
                <h2>Confirm Logout</h2>
                <p>Are you sure you want to logout? You will need to login again to access your account.</p>
                
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="button" onclick="window.history.back()" style="flex: 1; background: var(--surface-border); color: var(--text);">Cancel</button>
                    <button type="button" onclick="performLogout()" style="flex: 1; background: var(--danger);">Logout</button>
                </div>
            </main>
        </div>

        <div class="brand-panel">
            <div class="brand-content">
                <h1>UNIEats</h1>
                <p>See you soon!</p>
            </div>
        </div>
        
    </main>

    <script>
        function performLogout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
