<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIEats - Login</title>
    <link rel="stylesheet" href="../styles/app.css">
</head>
<body>

    <div class="split-layout">
        
        <div class="form-panel">
            <main class="container">
                <form action="#" method="POST" id="loginForm">
                    <h2>Welcome Back</h2>

                    <div class="input-group">
                        <div class="input-header"><label for="login_identifier">Email or Username</label></div>
                        <input type="text" name="login_identifier" id="login_identifier" placeholder="Enter your email or username" required>
                    </div>

                    <div class="input-group">
                        <div class="input-header"><label for="password">Password</label></div>
                        <input type="password" name="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <div class="input-group">
                        <div class="input-header"><label for="userRole">Login As</label></div>
                        <select name="userRole" id="userRole" required class="role-select">
                            <option value="student">Student</option>
                            <option value="owner">Restaurant Owner</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <button type="submit">Login</button>

                    <div class="auth-links">
                        <p>Don't have an account? <a href="register.html">Register here</a></p>
                        <p style="margin-top: 10px;"><a href="forgot-password.html">Forgot Password?</a></p>
                    </div>
                </form>
            </main>
        </div>

        <div class="brand-panel">
            <div class="brand-content">
                <h1>UNIEats</h1>
                <p>Welcome back to the best food on campus.</p>
            </div>
        </div>
        
    </div>

    <script src="../script/app.js"></script>
</body>
</html>
