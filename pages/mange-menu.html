<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage Menu</title>

<link rel="stylesheet" href="../styles/all owner.css">
</head>

<body>
    <nav class="navbar">
        <a href="javascript:history.back()" class="back-arrow" aria-label="Go back">←</a>
        <div class="logo">UniEats Owner</div>
        <div class="links">
            <a href="owner-dashbroad.html">Dashboard</a>
            <a href="mange-menu.html" class="active">Manage Menu</a>
            <a href="orders.html">Orders</a>
            <a href="login.html">Logout</a>
        </div>
    </nav>

<div class="container">

<main class="main">

<h1>Manage Menu 🍔</h1>

<div class="manage-menu-controls">
    <div class="restaurant-info">
        <span>Restaurant</span>
        <strong id="restaurantName">Loading...</strong>
    </div>
</div>

<div class="add-item-form">
    <input id="itemName" placeholder="Item Name" class="form-input">
    <input id="itemPrice" placeholder="Price (EGP)" type="number" class="form-input" min="0" step="0.01">
    <input id="itemCategory" placeholder="Category" class="form-input">
    <div class="image-upload-wrapper">
        <label for="itemImage" class="image-upload-label">
            <span>📷 Upload Image</span>
            <input id="itemImage" type="file" accept="image/*" class="image-input">
        </label>
        <div id="imagePreview" class="image-preview"></div>
    </div>
    <button onclick="addItem()" class="btn btn-primary">Add Item</button>
</div>

<ul id="menuList" class="menu-list"></ul>

</main>

</div>

<script src="../script/all student.js"></script>
<script src="../script/all owner.js"></script>
</body>
</html>
