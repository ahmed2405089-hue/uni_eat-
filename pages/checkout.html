<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/student.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">UNIEats</div>
        <div class="links">
            <a href="student-home.html">Home</a>
            <a href="cart.html">Cart</a>
            <a href="profile.html">Profile</a>
            <a href="login.html">Logout</a>
        </div>
    </nav>

    <h1 class="checkout-title">Checkout</h1>

    <div class="container checkout-container">
        <ul id="orderList"></ul>
        <h3 class="checkout-total">Total: <span id="total"></span></h3>

        <div class="input-group">
            <label for="orderComment">Special Instructions (optional)</label>
            <textarea id="orderComment" class="order-comment" placeholder="e.g. add extra ranch sauce, no onions, etc." rows="3" maxlength="200"></textarea>
        </div>

        <button class="checkout-btn" onclick="placeOrder()">Place Order</button>
    </div>

    <script src="../script/checkout.js"></script>
</body>
