<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIEats - Cart</title>

    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/student.css">
</head>

<body>
    <nav class="navbar">
        <a href="javascript:history.back()" class="back-arrow" aria-label="Go back">←</a>
        <div class="links">
            <a href="student-home.html">Home</a>
            <a href="cart.html" class="active">Cart</a>
            <a href="profile.html">Profile</a>
            <a href="#" onclick="confirmLogout(event)">Logout</a>
        </div>
    </nav>

    <main class="container cart-page">
        <h2 class="cart-title">Your Cart</h2>

        <div class="cart-layout">
            <div class="cart-items" id="cart-items">
                <!-- Items will be loaded here -->
            </div>

            <aside class="cart-summary">
                <h3>Order Summary</h3>

            <div class="summary-line">
                <span>Subtotal:</span>
                <span id="subtotal">EGP 0.00</span>
            </div>

            <div class="summary-line">
                <span>Tax (5%):</span>
                <span id="tax">EGP 0.00</span>
            </div>

            <div class="summary-line total">
                <span>Total:</span>
                <span id="total">EGP 0.00</span>
            </div>

            <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
        </aside>
        </div>
    </main>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        cart = cart.map(item => ({
            ...item,
            quantity: item.quantity ?? item.qty ?? 1
        }));

        function createToastContainer() {
            let container = document.getElementById("toast-container");
            if (!container) {
                container = document.createElement("div");
                container.id = "toast-container";
                document.body.appendChild(container);
            }
            return container;
        }

        function showToast(message, type = "success") {
            const container = createToastContainer();
            const toast = document.createElement("div");
            toast.className = `toast-message ${type}`;
            toast.textContent = message;
            container.appendChild(toast);

            requestAnimationFrame(() => {
                toast.classList.add("show");
            });

            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 250);
            }, 2200);
        }

        function renderCart() {
            const container = document.getElementById("cart-items");
            container.innerHTML = "";

            let subtotal = 0;

            cart.forEach((item, index) => {
                let itemTotal = item.price * item.quantity;
                subtotal += itemTotal;

                container.innerHTML += `
                <div class="cart-item">
                    <div class="item-info">
                        <h4>${item.name}</h4>
                        <p>Price: EGP ${item.price.toFixed(2)}</p>
                    </div>

                    <div class="item-quantity">
                        <button onclick="changeQty(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button onclick="changeQty(${index}, 1)">+</button>
                    </div>

                    <div class="item-total">
                        EGP ${itemTotal.toFixed(2)}
                    </div>

                    <button class="remove-btn" onclick="removeItem(${index})">X</button>
                </div>
                `;
            });

            let tax = subtotal * 0.05;
            let total = subtotal + tax;

            document.getElementById("subtotal").textContent = `EGP ${subtotal.toFixed(2)}`;
            document.getElementById("tax").textContent = `EGP ${tax.toFixed(2)}`;
            document.getElementById("total").textContent = `EGP ${total.toFixed(2)}`;

            localStorage.setItem("cart", JSON.stringify(cart));
        }

        function changeQty(index, change) {
            cart[index].quantity += change;

            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }

            renderCart();
        }

        function removeItem(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function addItem(name, price) {
            let existing = cart.find(item => item.name === name);

            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ name, price, quantity: 1 });
            }

            renderCart();
        }

        function checkout() {
            if (cart.length === 0) {
                showToast("Cart is empty!", "info");
                return;
            }

            window.location.href = "checkout.html";
        }

        // Back-arrow control utilities — show only when requested or if there's history
        (function () {
            function getBack() { return document.querySelector('.back-arrow'); }
            window.showBackArrow = function () { const b = getBack(); if (b) b.classList.add('show'); };
            window.hideBackArrow = function () { const b = getBack(); if (b) b.classList.remove('show'); };
            const b = getBack();
            if (b && (window.history.length > 1 || (window.location.search && window.location.search.includes('id=')))) {
                b.classList.add('show');
            }
        })();

        renderCart();
    </script>

</body>
</html>
