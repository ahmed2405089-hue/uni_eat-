<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIEats - Home</title>
    <link rel="stylesheet" href="../styles/colors.css">
    <link rel="stylesheet" href="../styles/global.css">
    <link rel="stylesheet" href="../styles/student.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">UNIEats</div>
        <div class="links">
            <a href="student-home.html">Home</a>
            <a href="cart.html">Cart</a>
            <a href="profile.html">Profile</a>
            <a href="login.html">Logout</a>
        </div>
    </nav>

    <main class="container home-container">
        <div class="welcome-banner">
            <h2>Welcome to UNIEats! 🍔</h2>
            <p>Find the best food on campus and skip the line.</p>
            <div class="search-bar">
                <input type="text" placeholder="Search for restaurants or food...">
                <button>Search</button>
            </div>
        </div>

        <h3 class="section-title">Available Restaurants</h3>

        <div class="restaurants-grid">
            <!-- Restaurant 1 -->
            <div class="restaurant-card" onclick="window.location.href='resturant-detalis.html'">
                <div class="restaurant-image" style="background-color: var(--peach);"></div>
                <div class="restaurant-info">
                    <h3>Campus Grill</h3>
                    <p class="tags">Burgers, Fries, Shakes</p>
                    <div class="card-meta">
                        <span class="rating">⭐ 4.5</span>
                        <span class="time">🕒 15 mins</span>
                    </div>
                </div>
            </div>

            <!-- Restaurant 2 -->
            <div class="restaurant-card" onclick="window.location.href='resturant-detalis.html'">
                <div class="restaurant-image" style="background-color: var(--light-yellow);"></div>
                <div class="restaurant-info">
                    <h3>Healthy Bites</h3>
                    <p class="tags">Salads, Wraps, Smoothies</p>
                    <div class="card-meta">
                        <span class="rating">⭐ 4.8</span>
                        <span class="time">🕒 10 mins</span>
                    </div>
                </div>
            </div>

            <!-- Restaurant 3 -->
            <div class="restaurant-card" onclick="window.location.href='resturant-detalis.html'">
                <div class="restaurant-image" style="background-color: var(--dark-pink);"></div>
                <div class="restaurant-info">
                    <h3>Pizza Express</h3>
                    <p class="tags">Pizza, Pasta, Italian</p>
                    <div class="card-meta">
                        <span class="rating">⭐ 4.2</span>
                        <span class="time">🕒 25 mins</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../script/script.js"></script>
</body>

</html>
