<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNIEats - Reset Password</title>
</head>
<body>
    <main>
        <h2>Set New Password</h2>
        <form id="reset-password-form">
            <input type="password" id="new-password" placeholder="New password" required>
            <input type="password" id="confirm-password" placeholder="Confirm new password" required>
            <div id="match-error" style="color: red; font-size: 0.85rem; display: none;">Passwords do not match.</div>
            <button type="submit">Reset Password</button>
        </form>
        <p><a href="login.html">← Back to Login</a></p>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            const warning = document.createElement('div');
            warning.style.color = 'red';
            warning.style.margin = '10px 0';
            warning.textContent = '⚠️ Missing reset token. Please use the "Forgot password" link again.';
            document.querySelector('main').insertBefore(warning, document.querySelector('form'));
        }

        const form = document.getElementById('reset-password-form');
        const newPwd = document.getElementById('new-password');
        const confirmPwd = document.getElementById('confirm-password');
        const errorDiv = document.getElementById('match-error');

        function validateMatch() {
            if (confirmPwd.value && newPwd.value !== confirmPwd.value) {
                errorDiv.style.display = 'block';
                return false;
            } else {
                errorDiv.style.display = 'none';
                return true;
            }
        }

        newPwd.addEventListener('input', validateMatch);
        confirmPwd.addEventListener('input', validateMatch);

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (!validateMatch()) return;
            if (!newPwd.value.trim()) {
                alert("Please enter a new password.");
                return;
            }
            alert(`Password reset simulated!\n\nToken from URL: ${token || 'none'}\nNew password would be saved.`);
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);
        });
    </script>
</body>
</html>
